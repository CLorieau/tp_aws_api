name: Pipeline CICD projet master

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: masterapp

jobs:

  test:
    name: test
    runs-on: ubuntu-latest
    steps: 
    
      - name: checkout
        uses: actions/checkout@v4

      - name: lancer les test
        run : ls -lah

  build :
    needs: test
    name: build
    runs-on: ubuntu-latest
    steps: 
    
      - name: recuperer le code 
        uses: actions/checkout@v4

      - name: build image
        run: docker build -t ${{env.IMAGE_NAME}} .
      
      - name: run image
        run: docker run -d -p 3000:3000 ${{env.IMAGE_NAME}}

      - name: tester le conteneur
        run: "curl 127.0.0.1:3000"

      