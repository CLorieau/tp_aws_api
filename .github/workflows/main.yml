name: Pipeline CICD projet master

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: masterapp
  REPO: ghcr.io

jobs:

  test:
    name: test
    runs-on: ubuntu-latest
    steps: 
    
      - name: checkout
        uses: actions/checkout@v4

      - name: lancer les test
        run : ls -lah

  build :
    needs: test
    name: build and push
    runs-on: ubuntu-latest
    steps: 
    
      - name: recuperer le code 
        uses: actions/checkout@v4

      - name: build image
        run: docker build -t ${{env.IMAGE_NAME}} .
      
      - name: run image
        run: docker run -d -p 3000:3000 ${{env.IMAGE_NAME}}

      - name: taguer en version courante
        run: docker tag ${{env.IMAGE_NAME}} ${{env.REPO}}/clorieau/${{env.IMAGE_NAME}}:1.0

      - name: taguer en version latest
        run: docker tag ${{env.IMAGE_NAME}} ${{env.REPO}}/clorieau/${{env.IMAGE_NAME}}:latest

      - name : connexion a GHCR
        uses: docker/login-action@v2
        with:
          registry: ${{env.REPO}}
          username: clorieau
          password: ${{ secrets.TOKENCICD }}

      - name: push image v1.0
        run: docker push ${{env.REPO}}/clorieau/${{env.IMAGE_NAME}}:1.0

      - name: push image latest
        run: docker push ${{env.REPO}}/clorieau/${{env.IMAGE_NAME}}:latest

  deploy:
    needs: build
    name: deploy
    runs-on: ubuntu-latest
    steps: 

      - name: connexion au VPS sur aws
        uses : appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.KEY }}
          script: |
            pwd
            ls